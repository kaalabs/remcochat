version = 2

[app]
default_provider_id = "opencode"

[app.skills]
enabled = false

[app.router]
enabled = true
provider_id = "opencode"
model_id = "gpt-5.4-mini"
min_confidence = 0.7
max_input_chars = 2400

[app.web_tools]
search_provider = "brave"
enabled = true
max_results = 8
recency = "week"
allowed_domains = []
blocked_domains = []

[app.reasoning]
enabled = true
effort = "high"
expose_to_client = false
openai_summary = "auto"
anthropic_budget_tokens = 0
google_thinking_budget = 0

[app.attachments]
enabled = false

[app.bash_tools]
enabled = false
provider = "docker"
access = "localhost"
project_root = "/app"
max_stdout_chars = 12000
max_stderr_chars = 12000
timeout_ms = 30000
max_concurrent_sandboxes = 2
idle_ttl_ms = 300000
variant = "v2"

[app.bash_tools.docker]
orchestrator_url = "http://sandboxd:8080"
admin_token_env = "REMCOCHAT_ADMIN_TOKEN"
network_mode = "default"
memory_mb = 2048

[app.bash_tools.sandbox]
runtime = "node24"
ports = [3000]
vcpus = 2
timeout_ms = 900000

[app.bash_tools.seed]
mode = "upload"
upload_include = "**/*"

[app.hue_gateway]
enabled = false
access = "localhost"
base_urls = ["http://hue-gateway:8000", "http://host.docker.internal:8000", "http://localhost:8000"]
timeout_ms = 8000
auth_header_env = "HUE_AUTH_HEADER"
bearer_token_env = "HUE_TOKEN"
api_key_env = "HUE_API_KEY"

[app.ov_nl]
enabled = false
access = "localhost"
base_urls = ["https://gateway.apiportal.ns.nl/reisinformatie-api"]
timeout_ms = 8000
subscription_key_env = "NS_APP_SUBSCRIPTION_KEY"
cache_max_ttl_seconds = 60

[app.local_access]
enabled = false
allowed_directories = []
allowed_commands = []

[providers.vercel]
name = "Vercel AI Gateway"
api_key_env = "VERCEL_AI_GATEWAY_API_KEY"
base_url = "https://ai-gateway.vercel.sh/v3/ai"
modelsdev_provider_id = "vercel"
default_model_id = "openai/gpt-5.4"
allowed_model_ids = [
  "openai/gpt-5.4",
  "openai/gpt-5.4-mini",
  "openai/gpt-5.4-nano",
  "anthropic/claude-sonnet-4.6",
  "google/gemini-3-flash",
  "deepseek/deepseek-v3.2-thinking",
]

[providers.opencode]
name = "OpenCode Zen"
base_url = "https://opencode.ai/zen/v1"
api_key_env = "OPENCODE_API_KEY"
modelsdev_provider_id = "opencode"
default_model_id = "gpt-5.4"
allowed_model_ids = [
  "gpt-5-nano",
  "gpt-5.2",
  "gpt-5.4",
  "gpt-5.4-mini",
  "kimi-k2.5",
]
